<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Engine Oil Analyzer (Data Fusion Architecture)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; max-width: 1200px; margin: 20px auto; padding: 20px; background: #f4f7f6; color: #333; }
        .container { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        input[type="number"], input[type="file"] { padding: 8px; margin-right: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 15px; background: #0056b3; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #004494; }
        #status { margin: 15px 0; font-weight: bold; color: #d9534f; }
        .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .chart-box { background: #fff; padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
        .report-box { margin-top: 20px; padding: 20px; background: #e9ecef; border-left: 5px solid #0056b3; border-radius: 4px; line-height: 1.6; }
        .highlight { font-weight: bold; color: #d9534f; }
    </style>
</head>
<body>
    <div class="container">
        <h2>엔진 오일 정밀 궤적 분석기 (Client-Side ROI Extraction)</h2>
        <div class="input-group">
            <label for="mileageInput">신규 샘플 주행거리 (km): </label>
            <input type="number" id="mileageInput" placeholder="예: 60000" required>
            <input type="file" id="fileInput" accept="image/*" required>
            <button onclick="analyzeNewSample()">융합 분석 실행</button>
        </div>
        <div id="status">대기 중...</div>
    </div>

    <div class="chart-grid" id="chartArea" style="display: none;">
        <div class="chart-box"><canvas id="chartL"></canvas></div>
        <div class="chart-box"><canvas id="chartA"></canvas></div>
        <div class="chart-box"><canvas id="chartB"></canvas></div>
        <div class="chart-box"><canvas id="chartDegradation"></canvas></div>
    </div>

    <div id="analysisReport" class="report-box" style="display: none;"></div>

    <script>
        // ==========================================
        // [모듈 1] 시스템 초기화 데이터 (Historical Seed Data)
        // ==========================================
        const HISTORICAL_SEED_DATA = [
            {"mileage": 0, "r": 173, "g": 184, "b": 172},
            {"mileage": 0, "r": 175, "g": 184, "b": 179},
            {"mileage": 17884, "r": 198, "g": 190, "b": 25},
            {"mileage": 23767, "r": 229, "g": 185, "b": 10},
            {"mileage": 25112, "r": 222, "g": 161, "b": 10},
            {"mileage": 25623, "r": 215, "g": 119, "b": 8},
            {"mileage": 25647, "r": 228, "g": 181, "b": 10},
            {"mileage": 32600, "r": 221, "g": 157, "b": 9},
            {"mileage": 34789, "r": 220, "g": 153, "b": 9},
            {"mileage": 52936, "r": 156, "g": 82, "b": 6},
            {"mileage": 86395, "r": 168, "g": 112, "b": 7},
            {"mileage": 98316, "r": 119, "g": 39, "b": 2},
            {"mileage": 100500, "r": 9, "g": 8, "b": 7}
        ];

        let chartInstances = {};

        // ==========================================
        // [모듈 2] 클라이언트 측 이미지 연산 (Edge Computing)
        // ==========================================
        function extractRGBFromImage(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        canvas.width = img.width;
                        canvas.height = img.height;
                        ctx.drawImage(img, 0, 0);

                        // 중심 50% 영역 (ROI) 설정
                        const startX = Math.floor(img.width * 0.25);
                        const startY = Math.floor(img.height * 0.25);
                        const roiW = Math.floor(img.width * 0.5);
                        const roiH = Math.floor(img.height * 0.5);

                        const imageData = ctx.getImageData(startX, startY, roiW, roiH);
                        const data = imageData.data;
                        let r = 0, g = 0, b = 0, count = 0;

                        // 픽셀 스캔 및 누적
                        for (let i = 0; i < data.length; i += 4) {
                            r += data[i];
                            g += data[i + 1];
                            b += data[i + 2];
                            count++;
                        }

                        resolve({
                            r: Math.round(r / count),
                            g: Math.round(g / count),
                            b: Math.round(b / count)
                        });
                    };
                    img.onerror = reject;
                    img.src = event.target.result;
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        // ==========================================
        // [모듈 3] 데이터 융합 및 백엔드 통신 파이프라인
        // ==========================================
        async function analyzeNewSample() {
            const newMileage = parseFloat(document.getElementById('mileageInput').value);
            const file = document.getElementById('fileInput').files[0];
            const status = document.getElementById('status');
            
            if (isNaN(newMileage) || !file) {
                return alert("시스템 오류: 주행거리와 이미지를 모두 입력해야 합니다.");
            }

            status.innerText = "엣지 컴퓨팅: 로컬 이미지 ROI 처리 중...";

            try {
                // 1. 신규 이미지 RGB 추출
                const newRgb = await extractRGBFromImage(file); 
                
                // 2. 과거 데이터(Seed)와 신규 데이터 병합
                const payload = [
                    ...HISTORICAL_SEED_DATA.map(item => ({...item, isNew: false})),
                    { mileage: newMileage, r: newRgb.r, g: newRgb.g, b: newRgb.b, isNew: true }
                ];

                status.innerText = "백엔드 통신: 비선형 색공간 매핑 및 DI 산출 중...";

                // 3. 서버 통신 (Netlify Function)
                const response = await fetch('/.netlify/functions/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const text = await response.text();
                let result;
                try { result = JSON.parse(text); } 
                catch(e) { throw new Error("서버 파싱 오류: " + text.substring(0, 50)); }

                if (!response.ok) throw new Error(result.error || "서버 통신 오류");

                // 4. 시각화 및 리포트 렌더링
                renderDashboard(result.data);
                status.innerText = "분석 완료 및 대시보드 렌더링 완료.";
                document.getElementById('chartArea').style.display = 'grid';

            } catch (error) {
                console.error("시스템 오류:", error);
                status.innerText = "분석 실패: " + error.message;
            }
        }

        // ==========================================
        // [모듈 4] 동적 시각화 (Chart.js)
        // ==========================================
        function renderDashboard(data) {
            const labels = data.map(d => d.x);
            
            function updateChart(canvasId, label, yData, yAxisLabel, lineColor) {
                // 기존 차트 파괴 (메모리 누수 방지)
                if (chartInstances[canvasId]) chartInstances[canvasId].destroy();
                
                // 타겟 샘플 시인성 강화 (마커 크기 및 색상)
                const pointColors = data.map(d => d.isNew ? '#FF0000' : (d.pointColor || '#0056b3'));
                const pointRadii = data.map(d => d.isNew ? 8 : 4);
                const pointZIndex = data.map(d => d.isNew ? 10 : 1);

                chartInstances[canvasId] = new Chart(document.getElementById(canvasId), {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: label,
                            data: yData,
                            borderColor: lineColor,
                            pointBackgroundColor: pointColors,
                            pointRadius: pointRadii,
                            pointBorderColor: '#000',
                            fill: false,
                            tension: 0.1,
                            order: pointZIndex
                        }]
                    },
                    options: { 
                        responsive: true, 
                        scales: { 
                            x: { title: { display: true, text: 'Mileage (km)' } }, 
                            y: { title: { display: true, text: yAxisLabel } } 
                        } 
                    }
                });
            }

            // 4개의 다차원 그래프 렌더링
            updateChart('chartL', 'CIE L* (Lightness Decay Sequence)', data.map(d => d.L), 'L* Value', '#555');
            updateChart('chartA', 'CIE a* (Red/Green Vector)', data.map(d => d.a), 'a* Value', '#d9534f');
            updateChart('chartB', 'CIE b* (Yellow/Blue Vector)', data.map(d => d.b), 'b* Value', '#f0ad4e');
            updateChart('chartDegradation', 'Degradation Index (Cumulative Euclidean ΔE)', data.map(d => d.y), 'DI Score', '#5cb85c');

            // 텍스트 리포트 생성 호출
            generateAnalysisReport(data);
        }

        // ==========================================
        // [모듈 5] 문맥 기반 텍스트 자동 생성 알고리즘 (평문화 적용)
        // ==========================================
        function generateAnalysisReport(data) {
            const newSample = data.find(d => d.isNew);
            const historicalData = data.filter(d => !d.isNew);
            const reportDiv = document.getElementById('analysisReport');
            
            if (!newSample) return;

            let html = `<h3>[인공지능 엔진 오일 분석 리포트] 측정된 주행거리: ${newSample.x.toLocaleString()} km</h3>`;
            html += `<p>▶ 현재 오일 상태 판별: <strong>${newSample.phase}</strong> (누적 오염도: ${newSample.y.toFixed(2)})</p>`;

            // 교체 임계점 도달 여부
            if (newSample.needsReplacement) {
                html += `<p class="highlight">⚠️ 시스템 경고: 오염도가 안전 기준을 초과했습니다. 엔진 보호를 위해 즉시 엔진 오일을 교체하시기 바랍니다.</p>`;
            }

            // 과거 데이터와의 시계열 편차 분석 (평문)
            if (historicalData.length > 0) {
                const nearestSample = historicalData.reduce((prev, curr) => 
                    Math.abs(curr.x - newSample.x) < Math.abs(prev.x - newSample.x) ? curr : prev
                );

                const diffMileage = Math.abs(newSample.x - nearestSample.x).toLocaleString();
                const diffDI = newSample.y - nearestSample.y;
                
                html += `<p><br><strong>[과거 측정 기록과의 비교 분석]</strong><br>`;
                html += `▶ 가장 주행거리가 비슷한 과거 기록(${nearestSample.x.toLocaleString()}km, 차이: ${diffMileage}km)과 비교한 결과:</p><ul>`;
                
                if (newSample.x === nearestSample.x) {
                    html += `<li>주행거리는 같지만, 오염도는 과거 측정치보다 ${diffDI > 0 ? '증가' : '감소'}했습니다.</li>`;
                } else if (diffDI > 30.0) {
                    html += `<li>오염도가 비정상적으로 빠르게 나빠졌습니다(<span class="highlight">+${diffDI.toFixed(2)}</span>). 엔진 부품이 갈려 쇳가루가 섞였거나, 엔진 결함으로 연소 가스(매연)가 오일로 새어 들어갔을 수 있으니 정비소 점검이 필요합니다.</li>`;
                } else if (diffDI < 0.0) {
                    html += `<li>오일 상태가 과거 측정 때보다 오히려 더 깨끗해졌습니다(${diffDI.toFixed(2)}). 기계의 측정 오차이거나, 최근에 새 엔진 오일을 추가로 보충(보충유 주입)하셨을 가능성이 있습니다.</li>`;
                } else {
                    html += `<li>오염도 증가폭(+${diffDI.toFixed(2)})이 정상적인 오일 노후화 범위 안에 있습니다. 오일 상태가 안정적으로 유지되고 있습니다.</li>`;
                }
                html += `</ul>`;
            }

            reportDiv.innerHTML = html;
            reportDiv.style.display = 'block';
        }
    </script>
</body>
</html>
