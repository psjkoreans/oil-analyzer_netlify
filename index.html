<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Engine Oil Analyzer v3.0 (Advanced Visualizer)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; max-width: 1200px; margin: 20px auto; padding: 20px; background: #f4f7f6; color: #333; }
        .container { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        input[type="number"], input[type="file"] { padding: 8px; margin-right: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 15px; background: #0056b3; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #004494; }
        #status { margin: 15px 0; font-weight: bold; color: #d9534f; }
        .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .chart-box { background: #fff; padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
        .report-box { margin-top: 20px; padding: 20px; background: #e9ecef; border-left: 5px solid #0056b3; border-radius: 4px; line-height: 1.6; }
        .highlight { font-weight: bold; color: #d9534f; }
    </style>
</head>
<body>
    <div class="container">
        <h2>엔진 오일 정밀 궤적 분석기</h2>
        <div class="input-group">
            <label for="mileageInput">주행거리 (km): </label>
            <input type="number" id="mileageInput" placeholder="예: 5000" required>
            <input type="file" id="fileInput" accept="image/*" required>
            <button onclick="addAndAnalyze()">샘플 추가 및 분석</button>
        </div>
        <div id="status">대기 중...</div>
    </div>

    <div class="chart-grid" id="chartArea" style="display: none;">
        <div class="chart-box"><canvas id="chartL"></canvas></div>
        <div class="chart-box"><canvas id="chartA"></canvas></div>
        <div class="chart-box"><canvas id="chartB"></canvas></div>
        <div class="chart-box"><canvas id="chartDegradation"></canvas></div>
    </div>

    <div id="analysisReport" class="report-box" style="display: none;"></div>

    <script>
    // [모듈 1] 시스템 초기화 데이터 (Seed Data)
    // 향후 r, g, b 값이 확보되면 아래 객체에 속성을 추가한다.
    const HISTORICAL_SEED_DATA = [
        // sample_data_1
        { filename: '9115.jpg', mileage: 180294, r: 45, g: 30, b: 20 }, // r,g,b는 예시 값
        { filename: '9122.jpg', mileage: 108537, r: 50, g: 35, b: 22 },
        { filename: '9123.jpg', mileage: 101100, r: 52, g: 38, b: 25 },
        { filename: '9133.jpg', mileage: 36982,  r: 80, g: 60, b: 40 },
        { filename: '9134.jpg', mileage: 32600,  r: 85, g: 62, b: 45 },
        { filename: '9135.jpg', mileage: 34789,  r: 82, g: 61, b: 42 },
        { filename: '9136.jpg', mileage: 25647,  r: 100, g: 80, b: 50 },
        { filename: '9137.jpg', mileage: 25112,  r: 105, g: 82, b: 55 },
        { filename: '9138.jpg', mileage: 23767,  r: 110, g: 85, b: 60 },
        { filename: '9139.jpg', mileage: 25623,  r: 108, g: 84, b: 58 },
        { filename: '9141.jpg', mileage: 5424,   r: 150, g: 120, b: 80 },
        // sample_data_3
        { filename: '7557-30.jpg', mileage: 1221,  r: 200, g: 180, b: 120 },
        { filename: '7557-78.jpg', mileage: 78290, r: 60,  g: 45,  b: 30 }
    ];
        
    <script>
        // 클라이언트 측 데이터 누적을 위한 상태 변수
        let historicalPayload = [];
        let chartInstances = {};

        async function addAndAnalyze() {
            const mileageInput = document.getElementById('mileageInput').value;
            const file = document.getElementById('fileInput').files[0];
            const status = document.getElementById('status');

            if (!file || !mileageInput) return alert("주행거리와 이미지를 모두 입력하십시오.");

            status.innerText = "이미지 전처리 및 서버 전송 중...";

            const img = new Image();
            img.src = URL.createObjectURL(file);
            
            img.onload = async () => {
                const canvas = document.createElement('canvas');
                const MAX_SIZE = 800;
                let width = img.width, height = img.height;
                
                if (width > height && width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; }
                else if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
                
                canvas.width = width; canvas.height = height;
                canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                const base64Image = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];

                // 기존 데이터에 과거(isNew: false) 속성 부여
                historicalPayload.forEach(item => item.isNew = false);
                
                // 신규 데이터 추가
                historicalPayload.push({ 
                    mileage: parseFloat(mileageInput), 
                    imageBase64: base64Image,
                    isNew: true 
                });

                try {
                    const response = await fetch('/.netlify/functions/analyze', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(historicalPayload)
                    });

                    const text = await response.text();
                    let responseData;
                    try { responseData = JSON.parse(text); } 
                    catch(e) { throw new Error("서버 파싱 오류: " + text.substring(0, 50)); }

                    if (!response.ok) throw new Error(responseData.error || "서버 통신 오류");

                    status.innerText = "분석 완료 및 렌더링 중...";
                    renderDashboard(responseData.data);
                    status.innerText = "분석이 완료되었습니다.";
                    document.getElementById('chartArea').style.display = 'grid';

                } catch (err) {
                    alert("시스템 오류 발생: " + err.message);
                    status.innerText = "분석 실패";
                    historicalPayload.pop(); // 실패 시 배열에서 신규 데이터 롤백
                }
            };
        }

        function renderDashboard(data) {
            const labels = data.map(d => d.x);
            
            // 공통 차트 생성 헬퍼 함수 (기존 차트 파괴 후 재생성)
            function updateChart(canvasId, label, yData, yAxisLabel, lineColor) {
                if (chartInstances[canvasId]) chartInstances[canvasId].destroy();
                
                const pointColors = data.map(d => d.isNew ? '#FF0000' : d.pointColor || '#0056b3');
                const pointRadii = data.map(d => d.isNew ? 8 : 4);

                chartInstances[canvasId] = new Chart(document.getElementById(canvasId), {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: label,
                            data: yData,
                            borderColor: lineColor,
                            pointBackgroundColor: pointColors,
                            pointRadius: pointRadii,
                            pointBorderColor: '#000',
                            fill: false,
                            tension: 0.1
                        }]
                    },
                    options: { responsive: true, scales: { x: { title: { display: true, text: 'Mileage (km)' } }, y: { title: { display: true, text: yAxisLabel } } } }
                });
            }

            // 1. y축이 L*, a*, b* 이고 x축이 mileage인 3개의 그래프
            updateChart('chartL', 'CIE L* (명도 감소도)', data.map(d => d.L), 'L* Value', '#555');
            updateChart('chartA', 'CIE a* (Red/Green 편향도)', data.map(d => d.a), 'a* Value', '#d9534f');
            updateChart('chartB', 'CIE b* (Yellow/Blue 편향도)', data.map(d => d.b), 'b* Value', '#f0ad4e');
            
            // 2. y축이 오염도, x축이 mileage인 그래프
            updateChart('chartDegradation', '종합 오염도 (Calculated DI)', data.map(d => d.y), 'Degradation Index', '#5cb85c');

            generateAnalysisReport(data);
        }

        function generateAnalysisReport(data) {
            const newSample = data.find(d => d.isNew);
            const historicalData = data.filter(d => !d.isNew);
            const reportDiv = document.getElementById('analysisReport');
            
            if (!newSample) return;

            let html = `<h3>[분석 리포트] 주행거리 ${newSample.x.toLocaleString()}km 신규 샘플</h3>`;
            html += `<p>업로드된 오일 샘플의 현재 광학적 열화 상태는 <strong>[${newSample.phase}]</strong> 입니다.</p>`;

            if (newSample.needsReplacement) {
                html += `<p class="highlight">⚠️ 임계 열화 수준에 도달했습니다. 엔진 보호를 위해 즉각적인 오일 교체를 강력히 권고합니다.</p>`;
            }

            if (historicalData.length > 0) {
                // 가장 인접한 마일리지 샘플 탐색 (유클리드 1차원 거리 최소값)
                const nearestSample = historicalData.reduce((prev, curr) => 
                    Math.abs(curr.x - newSample.x) < Math.abs(prev.x - newSample.x) ? curr : prev
                );

                const mileageDiff = newSample.x - nearestSample.x;
                const degDiff = (newSample.y - nearestSample.y).toFixed(2);
                
                html += `<p><strong>비교 분석:</strong> 주행거리 ${nearestSample.x.toLocaleString()}km 시점의 과거 데이터와 비교한 결과, `;
                
                if (mileageDiff === 0) {
                    html += `동일 주행거리에서 오염도가 ${degDiff > 0 ? '증가' : '감소'}하였습니다. 이는 샘플링 오차 또는 엔진의 급격한 상태 변화를 시사합니다.</p>`;
                } else if (degDiff > 5.0) {
                    html += `오염도가 <span class="highlight">비정상적으로 급증(+${degDiff})</span>하였습니다. 가혹한 주행 환경이 원인일 수 있으니 점검이 필요합니다.</p>`;
                } else if (degDiff < 0) {
                    html += `오염도가 오히려 감소(${degDiff})하였습니다. 최근 오일을 보충(Top-up)했거나 수분 유입 가능성이 존재합니다.</p>`;
                } else {
                    html += `오염도 증가폭(+${degDiff})이 정상적인 다항식 열화 곡선을 추종하고 있습니다.</p>`;
                }
            } else {
                html += `<p>과거 데이터가 존재하지 않아 시계열 추세 분석은 생략되었습니다. 추가 샘플을 업로드하여 궤적을 확인하십시오.</p>`;
            }

            reportDiv.innerHTML = html;
            reportDiv.style.display = 'block';
        }
    </script>
</body>
</html>
